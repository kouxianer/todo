<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDo Pro - 数据库同步版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .task-done { text-decoration: line-through; opacity: 0.5; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; font-weight: 600; }
    </style>
</head>
<body class="min-h-screen text-slate-800 pb-12">
    <script>
        const SUPABASE_URL = '你的_PROJECT_URL';
        const SUPABASE_KEY = '你的_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>

    <div class="max-w-2xl mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-indigo-600">ZenDo <span class="text-xs bg-indigo-100 px-2 py-1 rounded">DB版</span></h1>
                <p id="status" class="text-slate-400 text-xs mt-1">● 正在连接数据库...</p>
            </div>
        </header>

        <div class="glass-card p-4 rounded-2xl shadow-lg mb-8">
            <div class="flex gap-2">
                <input type="text" id="task-input" placeholder="同步到云端..." class="flex-1 bg-transparent border-none outline-none px-2 text-lg">
                <select id="task-category" class="bg-slate-100 rounded-xl px-3 outline-none border-none text-sm">
                    <option value="today">🔥 今天</option>
                    <option value="later">⏳ 稍后</option>
                    <option value="goals">🎯 目标</option>
                </select>
                <button id="add-task" class="bg-indigo-600 text-white w-12 h-12 rounded-xl hover:bg-indigo-700 transition-all">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>

        <div class="flex gap-8 mb-6 border-b border-slate-200 text-slate-500 font-medium overflow-x-auto">
            <button onclick="filterTasks('today')" id="tab-today" class="pb-3 tab-active">今天必做</button>
            <button onclick="filterTasks('later')" id="tab-later" class="pb-3">计划稍后</button>
            <button onclick="filterTasks('goals')" id="tab-goals" class="pb-3">长期愿望</button>
        </div>

        <div id="task-list" class="space-y-3"></div>
        <div id="empty-state" class="hidden text-center py-20 text-slate-300">
            <i class="fas fa-cloud-upload-alt text-5xl mb-4"></i>
            <p>云端暂无数据</p>
        </div>
    </div>

    <script>
        let tasks = [];
        let currentFilter = 'today';

        // 1. 从数据库拉取数据
        async function fetchTasks() {
            document.getElementById('status').textContent = '● 正在拉取云端数据...';
            const { data, error } = await supabase
                .from('tasks')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error(error);
                document.getElementById('status').textContent = '● 连接失败';
            } else {
                tasks = data;
                render();
                document.getElementById('status').textContent = '● 已与云端实时同步';
            }
        }

        // 2. 渲染 UI
        function render() {
            const list = document.getElementById('task-list');
            const filtered = tasks.filter(t => t.category === currentFilter);
            list.innerHTML = '';
            
            if (filtered.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                filtered.forEach(task => {
                    const div = document.createElement('div');
                    div.className = `glass-card p-4 rounded-xl flex items-center justify-between transition-all`;
                    div.innerHTML = `
                        <div class="flex items-center gap-4 flex-1">
                            <button onclick="toggleTask(${task.id}, ${task.completed})" class="w-6 h-6 rounded-full border-2 ${task.completed ? 'bg-indigo-500 border-indigo-500' : 'border-slate-200'}">
                                ${task.completed ? '<i class="fas fa-check text-white text-[10px] ml-1"></i>' : ''}
                            </button>
                            <span class="${task.completed ? 'task-done text-slate-400' : ''}">${task.text}</span>
                        </div>
                        <button onclick="deleteTask(${task.id})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    `;
                    list.appendChild(div);
                });
            }
        }

        // 3. 写入数据库
        async function addTask() {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            const category = document.getElementById('task-category').value;
            if (!text) return;

            const { error } = await supabase
                .from('tasks')
                .insert([{ text, category, completed: false }]);

            if (!error) {
                input.value = '';
                fetchTasks();
            }
        }

        // 4. 更新数据库
        async function toggleTask(id, currentStatus) {
            await supabase.from('tasks').update({ completed: !currentStatus }).eq('id', id);
            fetchTasks();
        }

        // 5. 从数据库删除
        async function deleteTask(id) {
            await supabase.from('tasks').delete().eq('id', id);
            fetchTasks();
        }

        function filterTasks(cat) {
            currentFilter = cat;
            ['today', 'later', 'goals'].forEach(c => {
                document.getElementById(`tab-${c}`).className = c === cat ? 'pb-3 tab-active' : 'pb-3';
            });
            render();
        }

        document.getElementById('add-task').onclick = addTask;
        document.getElementById('task-input').onkeypress = (e) => e.key === 'Enter' && addTask();

        // 初始拉取
        fetchTasks();
    </script>
</body>
</html>
