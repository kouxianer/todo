<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDo - 极简专注清单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .task-done {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .tab-active {
            border-bottom: 3px solid #6366f1;
            color: #6366f1;
            font-weight: 600;
        }
        .animate-fadeIn {
            animation: fadeIn 0.25s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 pb-12">

    <div class="max-w-2xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-indigo-600 tracking-tight">ZenDo</h1>
                <p class="text-slate-500 text-sm">让效率回归简单</p>
            </div>
            <div id="timer-box" class="bg-indigo-50 text-indigo-600 px-5 py-2 rounded-full font-mono font-bold flex items-center gap-3 shadow-sm border border-indigo-100">
                <i class="fas fa-hourglass-half animate-pulse"></i>
                <span id="time-left">25:00</span>
                <button id="timer-toggle" class="hover:scale-110 transition-transform active:scale-95">
                    <i class="fas fa-play" id="timer-icon"></i>
                </button>
            </div>
        </header>

        <!-- Input Area -->
        <div class="glass-card p-4 rounded-2xl shadow-lg mb-8 border-indigo-50">
            <div class="flex gap-2">
                <input type="text" id="task-input" placeholder="准备做什么？" 
                    class="flex-1 bg-transparent border-none focus:ring-0 text-lg outline-none px-2 placeholder:text-slate-300">
                <select id="task-category" class="bg-slate-100 rounded-xl px-3 text-sm outline-none border-none font-medium cursor-pointer hover:bg-slate-200 transition-colors">
                    <option value="today">🔥 今天</option>
                    <option value="later">⏳ 稍后</option>
                    <option value="goals">🎯 目标</option>
                </select>
                <button id="add-task" class="bg-indigo-600 text-white w-12 h-12 rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-all active:scale-90 flex items-center justify-center">
                    <i class="fas fa-plus text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="flex gap-8 mb-6 border-b border-slate-200 text-slate-500 font-medium overflow-x-auto no-scrollbar">
            <button onclick="filterTasks('today')" id="tab-today" class="pb-3 tab-active whitespace-nowrap">今天必做</button>
            <button onclick="filterTasks('later')" id="tab-later" class="pb-3 whitespace-nowrap">计划稍后</button>
            <button onclick="filterTasks('goals')" id="tab-goals" class="pb-3 whitespace-nowrap">长期愿望</button>
        </div>

        <!-- Task List -->
        <div id="task-list" class="space-y-3 min-h-[200px]">
            <!-- Tasks will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20 bg-white/50 rounded-3xl border-2 border-dashed border-slate-100">
            <div class="text-slate-200 text-7xl mb-4"><i class="fas fa-feather-alt"></i></div>
            <p class="text-slate-400 font-medium">此刻空空如也，添加点什么吧</p>
        </div>
    </div>

    <script>
        // 状态管理
        let state = {
            tasks: JSON.parse(localStorage.getItem('zendo-tasks')) || [],
            currentFilter: 'today',
            timeLeft: 25 * 60,
            isTimerRunning: false,
            timerId: null
        };

        // DOM 元素
        const els = {
            taskInput: document.getElementById('task-input'),
            categorySelect: document.getElementById('task-category'),
            addTaskBtn: document.getElementById('add-task'),
            taskList: document.getElementById('task-list'),
            emptyState: document.getElementById('empty-state'),
            timeLeftDisplay: document.getElementById('time-left'),
            timerToggleBtn: document.getElementById('timer-toggle'),
            timerIcon: document.getElementById('timer-icon')
        };

        // 核心渲染逻辑
        function render() {
            const filtered = state.tasks.filter(t => t.category === state.currentFilter);
            els.taskList.innerHTML = '';
            
            if (filtered.length === 0) {
                els.emptyState.classList.remove('hidden');
            } else {
                els.emptyState.classList.add('hidden');
                filtered.forEach((task) => {
                    const item = document.createElement('div');
                    item.className = `glass-card p-4 rounded-xl flex items-center justify-between group animate-fadeIn shadow-sm hover:border-indigo-200 transition-all`;
                    
                    // 按钮逻辑
                    const moveToday = state.currentFilter !== 'today' ? `<button onclick="moveTask(${task.id}, 'today')" title="移至今天" class="w-8 h-8 rounded-lg hover:bg-orange-50 hover:text-orange-500 transition-colors"><i class="fas fa-fire"></i></button>` : '';
                    const moveLater = state.currentFilter !== 'later' ? `<button onclick="moveTask(${task.id}, 'later')" title="移至稍后" class="w-8 h-8 rounded-lg hover:bg-blue-50 hover:text-blue-500 transition-colors"><i class="fas fa-clock"></i></button>` : '';
                    const moveGoals = state.currentFilter !== 'goals' ? `<button onclick="moveTask(${task.id}, 'goals')" title="移至目标" class="w-8 h-8 rounded-lg hover:bg-emerald-50 hover:text-emerald-500 transition-colors"><i class="fas fa-bullseye"></i></button>` : '';

                    item.innerHTML = `
                        <div class="flex items-center gap-4 flex-1 mr-4">
                            <button onclick="toggleTask(${task.id})" class="w-6 h-6 shrink-0 rounded-full border-2 ${task.completed ? 'bg-indigo-500 border-indigo-500' : 'border-slate-200'} flex items-center justify-center transition-all hover:scale-110">
                                ${task.completed ? '<i class="fas fa-check text-white text-[10px]"></i>' : ''}
                            </button>
                            <span class="${task.completed ? 'task-done text-slate-400' : 'text-slate-700'} font-medium leading-tight">
                                ${escapeHtml(task.text)}
                            </span>
                        </div>
                        <div class="flex items-center gap-1">
                            <div class="flex items-center text-slate-400 md:opacity-0 group-hover:opacity-100 transition-opacity pr-2 border-r border-slate-100 mr-1">
                                ${moveToday} ${moveLater} ${moveGoals}
                            </div>
                            <button onclick="deleteTask(${task.id})" class="w-8 h-8 rounded-lg text-slate-300 hover:text-red-500 hover:bg-red-50 transition-all">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    `;
                    els.taskList.appendChild(item);
                });
            }
            save();
        }

        // 事件处理
        window.toggleTask = (id) => {
            state.tasks = state.tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            render();
        };

        window.deleteTask = (id) => {
            state.tasks = state.tasks.filter(t => t.id !== id);
            render();
        };

        window.moveTask = (id, newCat) => {
            state.tasks = state.tasks.map(t => t.id === id ? {...t, category: newCat} : t);
            render();
            showToast(`已移至 ${newCat === 'today' ? '今天' : (newCat === 'later' ? '稍后' : '目标')}`);
        };

        window.filterTasks = (cat) => {
            state.currentFilter = cat;
            ['today', 'later', 'goals'].forEach(c => {
                document.getElementById(`tab-${c}`).className = c === cat ? 'pb-3 tab-active' : 'pb-3 transition-all';
            });
            render();
        };

        function addTask() {
            const val = els.taskInput.value.trim();
            if (!val) return;

            const newTask = {
                id: Date.now(),
                text: val,
                category: els.categorySelect.value,
                completed: false
            };

            state.tasks.unshift(newTask);
            els.taskInput.value = '';
            filterTasks(newTask.category);
        }

        // 番茄钟逻辑
        function toggleTimer() {
            if (state.isTimerRunning) {
                clearInterval(state.timerId);
                els.timerIcon.className = 'fas fa-play';
                document.getElementById('timer-box').classList.remove('ring-2', 'ring-indigo-400');
            } else {
                document.getElementById('timer-box').classList.add('ring-2', 'ring-indigo-400');
                state.timerId = setInterval(() => {
                    state.timeLeft--;
                    updateTimerUI();
                    if (state.timeLeft <= 0) {
                        clearInterval(state.timerId);
                        state.isTimerRunning = false;
                        state.timeLeft = 25 * 60;
                        els.timerIcon.className = 'fas fa-play';
                        showToast("🎉 专注结束！休息一下吧");
                        updateTimerUI();
                    }
                }, 1000);
                els.timerIcon.className = 'fas fa-pause';
            }
            state.isTimerRunning = !state.isTimerRunning;
        }

        function updateTimerUI() {
            const m = Math.floor(state.timeLeft / 60);
            const s = state.timeLeft % 60;
            els.timeLeftDisplay.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // 工具函数
        function save() {
            localStorage.setItem('zendo-tasks', JSON.stringify(state.tasks));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl z-[100] animate-fadeIn font-medium text-sm";
            t.innerHTML = msg;
            document.body.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translate(-50%, 20px)';
                t.style.transition = 'all 0.4s';
                setTimeout(() => t.remove(), 400);
            }, 2000);
        }

        // 初始化
        els.addTaskBtn.onclick = addTask;
        els.taskInput.onkeypress = (e) => e.key === 'Enter' && addTask();
        els.timerToggleBtn.onclick = toggleTimer;

        // 初始运行
        render();
        console.log("ZenDo 已初始化");
    </script>
</body>
</html>
