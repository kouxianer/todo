<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDo Pro - 数据库同步版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .task-done { text-decoration: line-through; opacity: 0.5; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; font-weight: 600; }
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen text-slate-800 pb-12">
    <script>
        // --- 填入你获取到的信息 ---
        const SUPABASE_URL = 'https://hqgglvaoqqoardxtiyjd.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_npeyRK7MnnW8bnSAZB1DfA_ZvD0lQPm'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>

    <div class="max-w-2xl mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-indigo-600">ZenDo <span class="text-xs bg-indigo-100 px-2 py-1 rounded">Cloud</span></h1>
                <p id="status" class="text-slate-400 text-xs mt-1">● 准备就绪</p>
            </div>
            <div id="timer-box" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full font-mono font-bold flex items-center gap-2">
                <i class="fas fa-stopwatch"></i>
                <span id="time-left">25:00</span>
                <button id="timer-btn" class="hover:text-indigo-800"><i class="fas fa-play"></i></button>
            </div>
        </header>

        <!-- 输入区 -->
        <div class="glass-card p-4 rounded-2xl shadow-lg mb-8">
            <div class="flex gap-2">
                <input type="text" id="task-input" placeholder="有什么新计划？" class="flex-1 bg-transparent border-none outline-none px-2 text-lg">
                <select id="task-category" class="bg-slate-100 rounded-xl px-2 outline-none border-none text-sm cursor-pointer">
                    <option value="today">🔥 今天</option>
                    <option value="later">⏳ 稍后</option>
                    <option value="goals">🎯 目标</option>
                </select>
                <button id="add-task" class="bg-indigo-600 text-white w-12 h-12 rounded-xl hover:bg-indigo-700 transition-all active:scale-95">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="flex gap-8 mb-6 border-b border-slate-200 text-slate-500 font-medium">
            <button onclick="filterTasks('today')" id="tab-today" class="pb-3 tab-active">今天必做</button>
            <button onclick="filterTasks('later')" id="tab-later" class="pb-3">计划稍后</button>
            <button onclick="filterTasks('goals')" id="tab-goals" class="pb-3">长期愿望</button>
        </div>

        <!-- 任务列表 -->
        <div id="task-list" class="space-y-3 min-h-[300px]"></div>

        <div id="empty-state" class="hidden text-center py-20 text-slate-300">
            <i class="fas fa-cloud-sun text-5xl mb-4"></i>
            <p>这一栏目前是空的</p>
        </div>
    </div>

    <script>
        let tasks = [];
        let currentFilter = 'today';
        let timeLeft = 25 * 60;
        let timerId = null;

        // 获取数据
        async function fetchTasks() {
            document.getElementById('status').textContent = '● 正在同步...';
            const { data, error } = await supabaseClient
                .from('tasks')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (!error) {
                tasks = data || [];
                render();
                document.getElementById('status').textContent = '● 云端已同步';
            } else {
                document.getElementById('status').textContent = '● 同步失败，请检查配置';
            }
        }

        // 渲染列表
        function render() {
            const list = document.getElementById('task-list');
            const filtered = tasks.filter(t => t.category === currentFilter);
            list.innerHTML = '';
            
            if (filtered.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                filtered.forEach(task => {
                    const div = document.createElement('div');
                    div.className = `glass-card p-4 rounded-xl flex items-center justify-between animate-pop shadow-sm hover:border-indigo-200 group`;
                    
                    // 动态生成移动按钮
                    const moveButtons = [];
                    if (currentFilter !== 'today') moveButtons.push(`<button onclick="moveTask(${task.id}, 'today')" title="移至今天" class="hover:text-orange-500 p-1"><i class="fas fa-fire"></i></button>`);
                    if (currentFilter !== 'later') moveButtons.push(`<button onclick="moveTask(${task.id}, 'later')" title="移至稍后" class="hover:text-blue-500 p-1"><i class="fas fa-clock"></i></button>`);
                    if (currentFilter !== 'goals') moveButtons.push(`<button onclick="moveTask(${task.id}, 'goals')" title="移至目标" class="hover:text-emerald-500 p-1"><i class="fas fa-bullseye"></i></button>`);

                    div.innerHTML = `
                        <div class="flex items-center gap-4 flex-1">
                            <button onclick="toggleTask(${task.id}, ${task.completed})" class="w-6 h-6 rounded-full border-2 ${task.completed ? 'bg-indigo-500 border-indigo-500' : 'border-slate-200'}">
                                ${task.completed ? '<i class="fas fa-check text-white text-[10px] ml-1"></i>' : ''}
                            </button>
                            <span class="${task.completed ? 'task-done text-slate-400' : 'text-slate-700 font-medium'}">${task.text}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="flex gap-1 border-r pr-2 border-slate-100 opacity-0 group-hover:opacity-100 transition-opacity text-slate-300">
                                ${moveButtons.join('')}
                            </div>
                            <button onclick="deleteTask(${task.id})" class="text-slate-300 hover:text-red-500 p-1"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            }
        }

        async function addTask() {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            const category = document.getElementById('task-category').value;
            if (!text) return;

            const { error } = await supabaseClient.from('tasks').insert([{ text, category, completed: false }]);
            if (!error) {
                input.value = '';
                fetchTasks();
            }
        }

        async function toggleTask(id, currentStatus) {
            await supabaseClient.from('tasks').update({ completed: !currentStatus }).eq('id', id);
            fetchTasks();
        }

        async function moveTask(id, newCat) {
            await supabaseClient.from('tasks').update({ category: newCat }).eq('id', id);
            fetchTasks();
        }

        async function deleteTask(id) {
            await supabaseClient.from('tasks').delete().eq('id', id);
            fetchTasks();
        }

        function filterTasks(cat) {
            currentFilter = cat;
            ['today', 'later', 'goals'].forEach(c => {
                document.getElementById(`tab-${c}`).className = c === cat ? 'pb-3 tab-active' : 'pb-3';
            });
            render();
        }

        // 番茄钟逻辑
        function updateTimer() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('time-left').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }

        document.getElementById('timer-btn').onclick = function() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                this.innerHTML = '<i class="fas fa-play"></i>';
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateTimer();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alert("专注结束！休息一下吧。");
                        timeLeft = 25 * 60;
                        updateTimer();
                    }
                }, 1000);
                this.innerHTML = '<i class="fas fa-pause"></i>';
            }
        };

        document.getElementById('add-task').onclick = addTask;
        document.getElementById('task-input').onkeypress = (e) => e.key === 'Enter' && addTask();

        // 初始拉取
        fetchTasks();
    </script>
</body>
</html>
